name: CD - Deploy To EC2

on:
  push:
    branches:
      - main
      - with_Database
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or tag to deploy
        required: false
        default: with_Database

concurrency:
  group: cd-ec2-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    env:
      HEYGEN_API_KEY: test-key
      MONGODB_URI: mongodb://localhost:27017/heygen_test
      SECRET_KEY: test-secret
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python sources
        run: PYTHONPYCACHEPREFIX=/tmp/pycache python -m compileall app tests

      - name: Run pytest
        run: pytest -q

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  remotion-checks:
    name: Remotion Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Remotion
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Remotion/package-lock.json

      - name: Install Remotion dependencies
        run: npm ci

  prepare:
    name: Prepare Deployment Metadata
    runs-on: ubuntu-latest
    needs:
      - backend-checks
      - frontend-checks
      - remotion-checks
    outputs:
      checkout_ref: ${{ steps.vars.outputs.checkout_ref }}
      ref_slug: ${{ steps.vars.outputs.ref_slug }}
      backend_image: ${{ steps.vars.outputs.backend_image }}
      frontend_image: ${{ steps.vars.outputs.frontend_image }}
      backend_deploy_ref: ${{ steps.vars.outputs.backend_deploy_ref }}
      frontend_deploy_ref: ${{ steps.vars.outputs.frontend_deploy_ref }}
    steps:
      - name: Compute deployment variables
        id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || '' }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_REF" ]; then
            raw_ref="$INPUT_REF"
            checkout_ref="$INPUT_REF"
          else
            raw_ref="$GITHUB_REF_NAME"
            checkout_ref="$GITHUB_SHA"
          fi

          ref_slug="$(printf '%s' "$raw_ref" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's#refs/heads/##; s#refs/tags/##' \
            | sed 's#[^a-z0-9._-]#-#g' \
            | sed 's#-\{2,\}#-#g' \
            | sed 's#^-##; s#-$##')"

          if [ -z "$ref_slug" ]; then
            ref_slug="manual"
          fi

          owner="$(printf '%s' "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          repo="$(printf '%s' "$REPOSITORY_NAME" | tr '[:upper:]' '[:lower:]')"
          backend_image="ghcr.io/$owner/${repo}-backend"
          frontend_image="ghcr.io/$owner/${repo}-frontend"

          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"
          echo "ref_slug=$ref_slug" >> "$GITHUB_OUTPUT"
          echo "backend_image=$backend_image" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$frontend_image" >> "$GITHUB_OUTPUT"
          echo "backend_deploy_ref=${backend_image}:$ref_slug" >> "$GITHUB_OUTPUT"
          echo "frontend_deploy_ref=${frontend_image}:$ref_slug" >> "$GITHUB_OUTPUT"

  publish-backend:
    name: Publish Backend Image
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ needs.prepare.outputs.backend_deploy_ref }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  publish-frontend:
    name: Publish Frontend Image
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: ${{ needs.prepare.outputs.frontend_deploy_ref }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy-ec2:
    name: Deploy On EC2
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish-backend
      - publish-frontend
    if: ${{ github.event_name == 'workflow_dispatch' || !startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Prepare EC2 app directory
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.EC2_APP_DIR }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT != '' && secrets.EC2_PORT || '22' }}
          envs: APP_DIR
          script: |
            set -euo pipefail
            mkdir -p "$APP_DIR/input" "$APP_DIR/output"
            test -f "$APP_DIR/.env" || {
              echo "Missing $APP_DIR/.env on EC2. Copy .env.example there and fill it before deploying."
              exit 1
            }

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT != '' && secrets.EC2_PORT || '22' }}
          source: docker-compose.ec2.yml
          target: ${{ secrets.EC2_APP_DIR }}

      - name: Pull and restart containers
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.EC2_APP_DIR }}
          BACKEND_IMAGE: ${{ needs.prepare.outputs.backend_deploy_ref }}
          FRONTEND_IMAGE: ${{ needs.prepare.outputs.frontend_deploy_ref }}
          FRONTEND_PORT: ${{ secrets.EC2_FRONTEND_PORT != '' && secrets.EC2_FRONTEND_PORT || '80' }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT != '' && secrets.EC2_PORT || '22' }}
          envs: APP_DIR,BACKEND_IMAGE,FRONTEND_IMAGE,FRONTEND_PORT,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd "$APP_DIR"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            if docker compose version >/dev/null 2>&1; then
              compose_cmd="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              compose_cmd="docker-compose"
            else
              echo "Docker Compose is not installed on EC2."
              exit 1
            fi

            export BACKEND_IMAGE FRONTEND_IMAGE FRONTEND_PORT
            $compose_cmd -f docker-compose.ec2.yml pull
            $compose_cmd -f docker-compose.ec2.yml up -d --remove-orphans
